# Pin the whole build/CI to a stable rustc known-good with Tauri 2 / time 0.3.x.
#
# Newer stable rustc (~1.96+) hits a spurious E0119 coherence error while
# compiling tauri-utils (a false conflict with the `time` crate's parser),
# which breaks `cargo check`/`cargo build`. rustc 1.90.0 is in the working
# window.
#
# This file lives at the REPO ROOT on purpose: CI runs
# `cargo check --manifest-path src-tauri/Cargo.toml` from the repo root, and
# rustup only honors a rust-toolchain file found in the current directory or
# its ancestors. The copy in src-tauri/ only applies when cargo is invoked
# from inside src-tauri/ (e.g. local `tauri dev`).
[toolchain]
channel = "1.90.0"
profile = "minimal"
