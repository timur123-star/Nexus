name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Typecheck, format & test (frontend)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Unit tests
        run: npm test

  rust:
    name: Check (rust · ${{ matrix.os }})
    # The product ships Windows/macOS/Linux, so compile-check on ALL THREE — the
    # Windows registry/PowerShell paths and the macOS pf/networksetup code never
    # built in CI before, only at release time (where a failure is far costlier).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
